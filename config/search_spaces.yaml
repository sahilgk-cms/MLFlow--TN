CatBoostRegressor:
  grid:
    iterations: [300, 800]
    learning_rate: [0.01, 0.15]
    depth: [4, 6]

  random:
    iterations: [300, 500, 700, 900, 1000]
    learning_rate: [0.01, 0.03, 0.05, 0.1, 0.15]
    depth: [4, 5, 6, 7, 8, 9, 10]

  optuna:
    iterations:
      type: int
      low: 300
      high: 1000
      step: 100

    learning_rate:
      type: float
      low: 0.01
      high: 0.15
      log: true

    depth:
      type: int
      low: 4
      high: 10

    l2_leaf_reg:
      type: float
      low: 1
      high: 15

    subsample:
      type: float
      low: 0.6
      high: 0.9